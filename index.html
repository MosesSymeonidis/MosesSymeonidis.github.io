<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moses Symeonidis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 4rem 2rem 2rem;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      color: #94a3b8;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: #818cf8;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.4rem 1rem;
      border: 1px solid #334155;
      border-radius: 9999px;
      transition: border-color 0.2s, color 0.2s;
    }

    .links a:hover {
      border-color: #818cf8;
      color: #c7d2fe;
    }

    main {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 2rem;
      flex: 1;
    }

    section { margin-bottom: 3rem; }

    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #1e293b;
    }

    p { line-height: 1.75; color: #cbd5e1; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .card h3 { font-size: 1rem; margin-bottom: 0.4rem; }
    .card p  { font-size: 0.875rem; color: #94a3b8; }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: #475569;
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">M</div>
    <h1>Moses Symeonidis</h1>
    <p class="tagline"><!-- tagline goes here --></p>
    <nav class="links">
      <a href="https://github.com/MosesSymeonidis" target="_blank">GitHub</a>
      <!-- add more links here -->
    </nav>
  </header>

  <main>

    <section id="about">
      <h2>About</h2>
      <p>
        <!-- bio goes here -->
      </p>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div class="cards">
        <div class="card">
          <h3>Project Name</h3>
          <p>Short description of the project.</p>
        </div>
      </div>
    </section>

  </main>

  <footer>
    &copy; 2026 Moses Symeonidis
  </footer>

</body>
</html>
